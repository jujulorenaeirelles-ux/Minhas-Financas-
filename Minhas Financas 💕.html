<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Minhas Finanças"/>
<meta name="theme-color" content="#ec4899"/>
<title>Minhas Finanças 💕</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#fff0f6;color:#4a1942;min-height:100vh;overscroll-behavior:none;}
input,select,button{font-family:inherit;}
input::placeholder{color:#f9a8d4;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{display:none;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:80px;}

/* Header */
.header{background:linear-gradient(135deg,#ec4899 0%,#be185d 50%,#9d174d 100%);padding:48px 20px 20px;border-bottom-left-radius:28px;border-bottom-right-radius:28px;box-shadow:0 8px 32px #ec489940;}
.header-title{font-size:11px;color:#fce7f3;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.header-value{font-size:28px;font-weight:900;color:#fff;letter-spacing:-1px;}
.header-sub{font-size:12px;color:#fbcfe8;margin-top:2px;}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.header-pills{display:flex;gap:10px;margin-top:18px;}
.pill{flex:1;background:rgba(255,255,255,0.18);border-radius:16px;padding:10px 12px;backdrop-filter:blur(8px);}
.pill-label{font-size:10px;color:#fce7f3;font-weight:700;margin-bottom:3px;}
.pill-val{font-size:15px;font-weight:900;color:#fff;font-family:monospace;}
.sel-header{padding:7px 12px;border-radius:12px;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;font-weight:700;outline:none;cursor:pointer;}
.sel-header option{color:#000;}
.header-selects{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}

/* Content */
.content{padding:20px 16px;}
.section-title{font-size:16px;font-weight:800;color:#be185d;margin-bottom:14px;}

/* Cards */
.card{background:#fff;border-radius:18px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px #f9a8d430;border:1.5px solid #fce7f3;}
.card-pink{background:#fff;border-radius:24px;padding:22px;box-shadow:0 4px 24px #f9a8d440;}

/* Progress bar */
.progress-bg{background:#fce7f3;border-radius:99px;height:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(.34,1.56,.64,1);}

/* Input */
.inp{width:100%;padding:13px 16px;border-radius:14px;background:#fff0f6;border:1.5px solid #fce7f3;color:#831843;font-size:14px;font-weight:600;outline:none;margin-bottom:12px;display:block;-webkit-appearance:none;}
.inp:focus{border-color:#ec4899;}

/* Buttons */
.btn-pink{padding:13px 0;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;font-weight:800;font-size:14px;box-shadow:0 4px 16px #ec489950;width:100%;}
.btn-pink-lg{padding:15px 0;border-radius:18px;border:none;cursor:pointer;background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;font-weight:900;font-size:16px;box-shadow:0 6px 24px #ec489960;width:100%;}
.btn-ghost{padding:8px 14px;border-radius:10px;border:1.5px solid #fce7f3;cursor:pointer;background:#fff;color:#be185d;font-weight:700;font-size:12px;}
.btn-del{background:#fce7f3;border:none;border-radius:8px;padding:5px 9px;color:#ec4899;cursor:pointer;font-size:12px;font-weight:700;}
.btn-tipo{flex:1;padding:11px 0;border-radius:14px;border:none;cursor:pointer;font-weight:800;font-size:14px;transition:all 0.2s;}
.btn-cat{padding:10px 8px;border-radius:14px;border:2px solid #fce7f3;background:#fff;color:#831843;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center;}
.btn-cat.active{background:#fff0f6;}
.btn-subtab{flex:1;padding:10px 0;border-radius:14px;border:2px solid #fce7f3;background:#fff;color:#be185d;font-weight:800;font-size:13px;cursor:pointer;}
.btn-subtab.active{background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;border-color:#ec4899;}

/* Notif */
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;color:#fff;padding:12px 24px;border-radius:50px;font-weight:800;font-size:14px;box-shadow:0 8px 32px #f9a8d460;white-space:nowrap;animation:popIn 0.3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) scale(0.8)}to{opacity:1;transform:translateX(-50%) scale(1)}}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1.5px solid #fce7f3;display:flex;box-shadow:0 -4px 24px #f9a8d440;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:10px 1px 8px;background:none;border:none;cursor:pointer;font-weight:600;font-size:8px;color:#d1a0c0;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-btn.active{color:#ec4899;font-weight:900;}
.nav-dot{width:16px;height:3px;background:#ec4899;border-radius:99px;margin-top:1px;}
.nav-icon{font-size:18px;}

/* Pie chart */
.pie-wrap{position:relative;width:160px;height:160px;margin:0 auto;}


/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:6px;padding:8px 0;height:180px;}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar-group-bars{display:flex;gap:2px;align-items:flex-end;width:100%;}
.bar{flex:1;border-radius:6px 6px 0 0;min-height:2px;transition:height 0.5s ease;}
.bar-label{font-size:9px;color:#f472b6;font-weight:700;text-align:center;word-break:break-all;line-height:1.2;}

/* Alert */
.alert{border-radius:18px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.alert-title{font-weight:900;font-size:13px;}
.alert-sub{font-size:11px;color:#6b7280;margin-top:2px;}

/* Tip row */
.tip-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:8px;}

/* History item */
.hist-item{background:#fff;border-radius:18px;padding:13px 15px;margin-bottom:10px;box-shadow:0 2px 12px #f9a8d430;display:flex;justify-content:space-between;align-items:center;gap:10px;}

/* Cartão hero */
.card-hero{border-radius:24px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.card-hero-bg{position:absolute;right:-20px;top:-20px;font-size:80px;opacity:0.1;pointer-events:none;}

/* Empty state */
.empty{text-align:center;padding:48px 16px;color:#f9a8d4;font-size:14px;font-weight:700;}

/* Compare grid */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cmp-card{border-radius:18px;padding:16px;}

/* Cat grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}

/* Tipo row */
.tipo-row{display:flex;gap:8px;margin-bottom:16px;}

.fade-up{animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.parcela-box{background:#fff0f6;border-radius:14px;padding:12px 14px;margin-bottom:14px;}
.parcela-hint{font-size:12px;color:#ec4899;font-weight:800;margin-top:4px;}

.emerg-item{background:#fff;border-radius:16px;padding:13px 15px;margin-bottom:10px;box-shadow:0 2px 10px #f9a8d420;}
.tag-pendente{font-size:10px;font-weight:900;color:#f43f5e;}
.tag-paga{font-size:10px;font-weight:900;color:#34d399;}
</style>
</head>
<body>
<div id="app">
  <div id="notif-area"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-title">Minhas Finanças 💕</div>
        <div class="header-value" id="hd-renda">R$ 1.100,00</div>
        <div class="header-sub" id="hd-mes">renda de Janeiro</div>
      </div>
      <div class="header-selects">
        <select class="sel-header" id="sel-mes"></select>
        <select class="sel-header" id="sel-ano"></select>
      </div>
    </div>
    <div class="header-pills">
      <div class="pill"><div class="pill-label">Gastos</div><div class="pill-val" id="hd-gastos">R$ 0,00</div></div>
      <div class="pill"><div class="pill-label">Saldo</div><div class="pill-val" id="hd-saldo">R$ 1.100,00</div></div>
      <div class="pill"><div class="pill-label">Reserva</div><div class="pill-val" id="hd-reserva">R$ 100,00</div></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div id="page-dashboard" class="fade-up"></div>
    <div id="page-lancar" class="fade-up" style="display:none"></div>
    <div id="page-cartao" class="fade-up" style="display:none"></div>
    <div id="page-historico" class="fade-up" style="display:none"></div>
    <div id="page-comparar" class="fade-up" style="display:none"></div>
    <div id="page-importar" class="fade-up" style="display:none"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="goTab('dashboard')" id="nb-dashboard"><span class="nav-icon">🏠</span>Início<div class="nav-dot"></div></button>
    <button class="nav-btn" onclick="goTab('lancar')" id="nb-lancar"><span class="nav-icon">➕</span>Lançar</button>
    <button class="nav-btn" onclick="goTab('cartao')" id="nb-cartao"><span class="nav-icon">💳</span>Cartão</button>
    <button class="nav-btn" onclick="goTab('historico')" id="nb-historico"><span class="nav-icon">📋</span>Histórico</button>
    <button class="nav-btn" onclick="goTab('comparar')" id="nb-comparar"><span class="nav-icon">📈</span>Comparar</button>
    <button class="nav-btn" onclick="goTab('importar')" id="nb-importar"><span class="nav-icon">📥</span>Importar</button>
  </nav>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
const RENDA = 1100, LIMITE_CARTAO = 1000;
const CATS = {
  alimentacao:{label:"Alimentação",cor:"#f472b6",orcamento:350,emoji:"🍽️"},
  transporte: {label:"Transporte", cor:"#c084fc",orcamento:100,emoji:"🚌"},
  lazer:      {label:"Lazer",      cor:"#fb7185",orcamento:150,emoji:"✨"},
  fatura:     {label:"Fatura Cartão",cor:"#e879f9",orcamento:200,emoji:"💳"},
  outros:     {label:"Outros",    cor:"#f9a8d4",orcamento:200,emoji:"🛍️"},
};
const MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let state = {
  lanc: load("fin_lanc",{}),
  gc:   load("fin_gc",0),
  emerg:load("fin_emerg",[]),
  mes:  new Date().getMonth(),
  ano:  new Date().getFullYear(),
  aba:  "dashboard",
  abaCartao: "uso",
  formTipo: "gasto",
  formCat: "alimentacao",
  formParcelas: 1,
};

function persist(){save("fin_lanc",state.lanc);save("fin_gc",state.gc);save("fin_emerg",state.emerg);}
function fmt(v){return "R$ "+v.toFixed(2).replace(".",",");}
function gk(m,a){return a+"-"+String(m).padStart(2,"0");}
function itens(){return state.lanc[gk(state.mes,state.ano)]||[];}

// ── NOTIF ──────────────────────────────────────────────
function showNotif(msg,tipo){
  const area=document.getElementById("notif-area");
  area.innerHTML="";
  const d=document.createElement("div");
  d.className="notif";
  d.textContent=msg;
  d.style.background=tipo==="erro"?"linear-gradient(135deg,#f43f5e,#e11d48)":tipo==="aviso"?"linear-gradient(135deg,#fb923c,#ea580c)":"linear-gradient(135deg,#ec4899,#be185d)";
  area.appendChild(d);
  setTimeout(()=>{d.remove();},3000);
}

// ── NAV ────────────────────────────────────────────────
function goTab(tab){
  state.aba=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".nav-btn .nav-dot").forEach(d=>d.remove());
  const nb=document.getElementById("nb-"+tab);
  nb.classList.add("active");
  const dot=document.createElement("div");dot.className="nav-dot";nb.appendChild(dot);
  document.querySelectorAll(".content > div").forEach(d=>d.style.display="none");
  const pg=document.getElementById("page-"+tab);
  pg.style.display="block";
  pg.classList.remove("fade-up");void pg.offsetWidth;pg.classList.add("fade-up");
  render();
}

// ── HEADER ────────────────────────────────────────────
function renderHeader(){
  const its=itens();
  const totalRec=its.filter(i=>i.tipo==="receita").reduce((s,i)=>s+i.valor,0);
  const totalGas=its.filter(i=>i.tipo==="gasto").reduce((s,i)=>s+i.valor,0);
  const saldo=RENDA+totalRec-totalGas;
  const reserva=RENDA-Object.values(CATS).reduce((s,c)=>s+c.orcamento,0);
  document.getElementById("hd-renda").textContent=fmt(RENDA+totalRec);
  document.getElementById("hd-mes").textContent="renda de "+MESES[state.mes];
  document.getElementById("hd-gastos").textContent=fmt(totalGas);
  document.getElementById("hd-saldo").textContent=fmt(saldo);
  document.getElementById("hd-saldo").style.color=saldo>=0?"#fff":"#fca5a5";
  document.getElementById("hd-reserva").textContent=fmt(reserva);
}

// ── SELECTS ───────────────────────────────────────────
function initSelects(){
  const sm=document.getElementById("sel-mes");
  MESES.forEach((m,i)=>{const o=document.createElement("option");o.value=i;o.textContent=m;if(i===state.mes)o.selected=true;sm.appendChild(o);});
  sm.onchange=()=>{state.mes=Number(sm.value);render();};
  const sa=document.getElementById("sel-ano");
  [2024,2025,2026].forEach(a=>{const o=document.createElement("option");o.value=a;o.textContent=a;if(a===state.ano)o.selected=true;sa.appendChild(o);});
  sa.onchange=()=>{state.ano=Number(sa.value);render();};
}

// ── DASHBOARD ─────────────────────────────────────────
function renderDashboard(){
  const its=itens();
  const map={};its.filter(i=>i.tipo==="gasto").forEach(i=>{map[i.categoria]=(map[i.categoria]||0)+i.valor;});
  const pctCart=Math.min((state.gc/LIMITE_CARTAO)*100,100);
  const stCart=pctCart>=90?"critico":pctCart>=70?"atencao":"ok";
  let html="";

  // Alert cartão
  if(stCart!=="ok"){
    const cor=stCart==="critico"?"#f43f5e":"#fb923c";
    const bg=stCart==="critico"?"#fef2f2":"#fff7ed";
    html+=`<div class="alert" style="background:${bg};border:2px solid ${cor}">
      <span style="font-size:24px">${stCart==="critico"?"🚨":"⚠️"}</span>
      <div><div class="alert-title" style="color:${cor}">${stCart==="critico"?"Cartão quase no limite!":"Atenção com o cartão"}</div>
      <div class="alert-sub">Usado ${fmt(state.gc)} de ${fmt(LIMITE_CARTAO)} (${pctCart.toFixed(0)}%)</div></div></div>`;
  }

  html+=`<div class="section-title">Limites por categoria 🎯</div>`;
  Object.entries(CATS).forEach(([key,cat])=>{
    const g=map[key]||0,over=g>cat.orcamento,pct=Math.min((g/cat.orcamento)*100,100),livre=Math.max(cat.orcamento-g,0);
    html+=`<div class="card" style="border-color:${over?"#f43f5e20":"#fce7f3"}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:20px">${cat.emoji}</span>
          <div><div style="font-weight:800;font-size:13px;color:#831843">${cat.label}</div>
          <div style="font-size:11px;color:#9ca3af">limite: ${fmt(cat.orcamento)}</div></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:900;color:${over?"#f43f5e":cat.cor};font-family:monospace">${fmt(g)}</div>
          <div style="font-size:10px;color:${over?"#f43f5e":"#34d399"};font-weight:700">${over?"⚠️ +"+fmt(g-cat.orcamento):"livre "+fmt(livre)}</div>
        </div>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${over?"linear-gradient(90deg,#f43f5e,#e11d48)":"linear-gradient(90deg,"+cat.cor+","+cat.cor+"cc)"}"></div></div>
    </div>`;
  });

  // Grafico horizontal CSS
  const totalGG=Object.values(map).reduce((s,v)=>s+v,0);
  if(totalGG>0){
    const rows=Object.entries(CATS).map(([key,cat])=>{
      const g=map[key]||0;if(!g)return "";
      const pct=Math.min((g/totalGG)*100,100).toFixed(0);
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#831843;margin-bottom:4px">
          <span>${cat.emoji} ${cat.label}</span>
          <span style="color:${cat.cor};font-family:monospace">${fmt(g)} (${pct}%)</span>
        </div>
        <div style="background:#fce7f3;border-radius:99px;height:10px;overflow:hidden">
          <div style="width:${pct}%;height:100%;border-radius:99px;background:${cat.cor}"></div>
        </div>
      </div>`;
    }).join("");
    html+=`<div class="card" style="margin-top:6px">
      <div style="font-size:14px;font-weight:800;color:#be185d;margin-bottom:14px">Onde o dinheiro foi 💸</div>
      ${rows}
    </div>`;
  }

  document.getElementById("page-dashboard").innerHTML=html;
}

// ── LANÇAR ────────────────────────────────────────────
function renderLancar(){
  const f=state;
  let catBtns=Object.entries(CATS).map(([k,c])=>`<button class="btn-cat${f.formCat===k?" active":""}" style="border-color:${f.formCat===k?c.cor:"#fce7f3"}" onclick="setCat('${k}')">${c.emoji} ${c.label}</button>`).join("");
  let parcelaBox="";
  if(f.formCat==="fatura"&&f.formTipo==="gasto"){
    parcelaBox=`<div class="parcela-box">
      <div style="font-size:12px;color:#be185d;font-weight:700;margin-bottom:8px">💳 Parcelamento</div>
      <input class="inp" type="number" min="1" max="24" id="inp-parcelas" value="${f.formParcelas}" placeholder="Número de parcelas" oninput="state.formParcelas=this.value;updateParcelaHint()" style="margin-bottom:4px"/>
      <div class="parcela-hint" id="parcela-hint"></div>
    </div>`;
  }
  document.getElementById("page-lancar").innerHTML=`
    <div class="card-pink">
      <div style="font-size:18px;font-weight:900;color:#be185d;margin-bottom:18px">Novo lançamento 📝</div>
      <div class="tipo-row">
        <button class="btn-tipo" style="background:${f.formTipo==="gasto"?"linear-gradient(135deg,#ec4899,#be185d)":"#fce7f3"};color:${f.formTipo==="gasto"?"#fff":"#be185d"};box-shadow:${f.formTipo==="gasto"?"0 4px 16px #ec489950":"none"}" onclick="setTipo('gasto')">💸 Gasto</button>
        <button class="btn-tipo" style="background:${f.formTipo==="receita"?"linear-gradient(135deg,#a3e635,#65a30d)":"#fce7f3"};color:${f.formTipo==="receita"?"#fff":"#be185d"};box-shadow:${f.formTipo==="receita"?"0 4px 16px #a3e63550":"none"}" onclick="setTipo('receita')">💰 Receita</button>
      </div>
      <input class="inp" id="inp-desc" placeholder="O que foi? ex: almoço, uber..." type="text"/>
      <input class="inp" id="inp-val" placeholder="Valor  ex: 45.90" type="number" step="0.01"/>
      ${f.formTipo==="gasto"?`<div style="font-size:12px;color:#be185d;font-weight:700;margin-bottom:6px">Categoria</div><div class="cat-grid">${catBtns}</div>${parcelaBox}`:""}
      <button class="btn-pink-lg" onclick="adicionar()">Adicionar 💖</button>
    </div>`;
  updateParcelaHint();
}

function updateParcelaHint(){
  const h=document.getElementById("parcela-hint");if(!h)return;
  const v=parseFloat(document.getElementById("inp-val")?.value||0);
  const p=parseInt(state.formParcelas)||1;
  if(v>0)h.textContent=p+"x de "+fmt(v/p)+" 💗";else h.textContent="";
}

function setTipo(t){state.formTipo=t;renderLancar();}
function setCat(k){state.formCat=k;renderLancar();}

function adicionar(){
  const desc=document.getElementById("inp-desc")?.value?.trim();
  const val=parseFloat(document.getElementById("inp-val")?.value);
  if(!desc||!val||val<=0){showNotif("Preencha tudo direitinho! 🥺","erro");return;}
  const chave=gk(state.mes,state.ano);
  if(state.formCat==="fatura"&&state.formTipo==="gasto"){
    const fa=(state.lanc[chave]||[]).filter(i=>i.categoria==="fatura"&&i.tipo==="gasto").reduce((s,i)=>s+i.valor,0);
    if(fa+val>CATS.fatura.orcamento)showNotif("⚠️ Vai passar do limite da fatura!","aviso");
  }
  const item={id:Date.now(),tipo:state.formTipo,descricao:desc,valor:parseFloat(val.toFixed(2)),
    categoria:state.formTipo==="gasto"?state.formCat:null,
    parcelas:state.formCat==="fatura"&&state.formTipo==="gasto"?parseInt(state.formParcelas)||1:1,
    data:new Date().toLocaleDateString("pt-BR")};
  if(!state.lanc[chave])state.lanc[chave]=[];

  persist();
  document.getElementById("inp-desc").value="";
  document.getElementById("inp-val").value="";
  showNotif("Anotado! 💖");

}

function editarGasto(){
  const novo=prompt("Valor total usado no cartão atualmente (ex: 250.00):");
  if(novo===null)return;
  const v=parseFloat(novo);
  if(!isNaN(v)&&v>=0){state.gc=parseFloat(v.toFixed(2));persist();showNotif("Atualizado! 💖");renderCartao();renderHeader();}
  else showNotif("Valor inválido","erro");
}

function setAbaCartao(a){state.abaCartao=a;renderCartao();}

function adicionarEmerg(){
  const desc=document.getElementById("emerg-desc")?.value?.trim();
  const val=parseFloat(document.getElementById("emerg-val")?.value);
  if(!desc||!val||val<=0){showNotif("Preencha a emergência! 🥺","erro");return;}
  const disp=LIMITE_CARTAO-state.gc;
  if(val>disp){showNotif("⚠️ Excede o disponível!","aviso");}
  state.emerg.push({id:Date.now(),descricao:desc,valor:parseFloat(val.toFixed(2)),data:new Date().toLocaleDateString("pt-BR"),paga:false});
  state.gc=parseFloat((state.gc+val).toFixed(2));
  persist();showNotif("Emergência registrada 🆘");renderCartao();renderHeader();
}

function togglePaga(id){
  state.emerg=state.emerg.map(e=>e.id===id?{...e,paga:!e.paga}:e);
  persist();renderCartao();
}
function removerEmerg(id){
  const e=state.emerg.find(x=>x.id===id);
  if(e&&!e.paga)state.gc=Math.max(0,parseFloat((state.gc-e.valor).toFixed(2)));
  state.emerg=state.emerg.filter(x=>x.id!==id);
  persist();renderCartao();renderHeader();
}

function renderComparar(){
  const prevIdx=state.mes===0?11:state.mes-1;
  const prevAno=state.mes===0?state.ano-1:state.ano;
  const prevItens=state.lanc[gk(prevIdx,prevAno)]||[];
  const curItens=itens();

  const gasC={},gasP={};
  curItens.filter(i=>i.tipo==="gasto").forEach(i=>{gasC[i.categoria]=(gasC[i.categoria]||0)+i.valor;});
  prevItens.filter(i=>i.tipo==="gasto").forEach(i=>{gasP[i.categoria]=(gasP[i.categoria]||0)+i.valor;});

  const cats=Object.entries(CATS);
  const maxVal=Math.max(1,...cats.map(([k])=>Math.max(gasC[k]||0,gasP[k]||0)));

  // Barras horizontais duplas CSS
  const bars=cats.map(([k,c])=>{
    const cur=gasC[k]||0,prev=gasP[k]||0;
    if(!cur&&!prev)return "";
    const pC=Math.min((cur/maxVal)*100,100).toFixed(0);
    const pP=Math.min((prev/maxVal)*100,100).toFixed(0);
    return `<div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:800;color:#831843;margin-bottom:5px">${c.emoji} ${c.label}</div>
      <div style="margin-bottom:3px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#f9a8d4;margin-bottom:2px"><span>${MESES[prevIdx]}</span><span style="font-family:monospace">${fmt(prev)}</span></div>
        <div style="background:#fce7f3;border-radius:99px;height:8px;overflow:hidden"><div style="width:${pP}%;height:100%;border-radius:99px;background:#fbcfe8"></div></div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#ec4899;margin-bottom:2px"><span>${MESES[state.mes]}</span><span style="font-family:monospace">${fmt(cur)}</span></div>
        <div style="background:#fce7f3;border-radius:99px;height:8px;overflow:hidden"><div style="width:${pC}%;height:100%;border-radius:99px;background:#ec4899"></div></div>
      </div>
    </div>`;
  }).join("");
  const legend="";

  const gCur=curItens.filter(i=>i.tipo==="gasto").reduce((s,i)=>s+i.valor,0);
  const rCur=curItens.filter(i=>i.tipo==="receita").reduce((s,i)=>s+i.valor,0);
  const slCur=RENDA+rCur-gCur;
  const gPrev=prevItens.filter(i=>i.tipo==="gasto").reduce((s,i)=>s+i.valor,0);
  const rPrev=prevItens.filter(i=>i.tipo==="receita").reduce((s,i)=>s+i.valor,0);
  const slPrev=RENDA+rPrev-gPrev;

  document.getElementById("page-comparar").innerHTML=`
    <div class="section-title">Comparar meses 📊</div>
    <div style="font-size:12px;color:#f472b6;font-weight:700;margin-bottom:16px">${MESES[prevIdx]} vs ${MESES[state.mes]}</div>
    <div class="card" style="margin-bottom:16px">
      ${legend}
      <div style="padding:4px 0">${bars}</div>
    </div>
    <div class="cmp-grid">
      <div class="cmp-card" style="background:#fbcfe8">
        <div style="font-size:12px;font-weight:900;color:#9d174d;margin-bottom:10px">${MESES[prevIdx]}</div>
        <div style="font-size:11px;color:#9d174d;opacity:0.8">Gastos</div>
        <div style="font-size:16px;font-weight:900;color:#9d174d;font-family:monospace;margin-bottom:6px">${fmt(gPrev)}</div>
        <div style="font-size:11px;color:#9d174d;opacity:0.8">Saldo</div>
        <div style="font-size:15px;font-weight:900;font-family:monospace;color:${slPrev>=0?"#16a34a":"#f43f5e"}">${fmt(slPrev)}</div>
      </div>
      <div class="cmp-card" style="background:#ec4899">
        <div style="font-size:12px;font-weight:900;color:#fff;margin-bottom:10px">${MESES[state.mes]}</div>
        <div style="font-size:11px;color:#fff;opacity:0.8">Gastos</div>
        <div style="font-size:16px;font-weight:900;color:#fff;font-family:monospace;margin-bottom:6px">${fmt(gCur)}</div>
        <div style="font-size:11px;color:#fff;opacity:0.8">Saldo</div>
        <div style="font-size:15px;font-weight:900;font-family:monospace;color:${slCur>=0?"#fce7f3":"#fca5a5"}">${fmt(slCur)}</div>
      </div>

function processarCSV(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const text=e.target.result;
      const itensImportados=parseInterCSV(text);
      if(itensImportados.length===0){
        document.getElementById("import-preview").innerHTML=`<div style="background:#fef2f2;border:1.5px solid #f43f5e;border-radius:14px;padding:14px;font-size:13px;color:#f43f5e;font-weight:700">⚠️ Nenhuma transação encontrada. Verifique se o arquivo é o extrato CSV do Inter.</div>`;
        return;
      }
      mostrarPreview(itensImportados);
    }catch(err){
      document.getElementById("import-preview").innerHTML=`<div style="background:#fef2f2;border:1.5px solid #f43f5e;border-radius:14px;padding:14px;font-size:13px;color:#f43f5e;font-weight:700">❌ Erro ao ler o arquivo. Certifique-se que é um CSV do Inter.</div>`;
    }
  };
  reader.readAsText(file,"UTF-8");
}

function parseInterCSV(text){
  // Tenta diferentes encodings/separadores
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const itens=[];
  // Detecta separador
  const sep=lines[0]&&lines[0].includes(";")?";":",";
  
  for(let i=0;i<lines.length;i++){
    const cols=lines[i].split(sep).map(c=>c.replace(/^"|"$/g,"").trim());
    // Inter CSV: Data;Histórico;Descrição;Valor  OU  Data,Descrição,Valor,Saldo
    // Tenta encontrar linhas com data no formato dd/mm/aaaa
    const dataMatch=cols[0]&&cols[0].match(/^(\d{2})[\/-](\d{2})[\/-](\d{4})$/);
    if(!dataMatch)continue;
    
    const dia=dataMatch[1],mes=dataMatch[2],ano=dataMatch[3];
    const data=`${dia}/${mes}/${ano}`;
    const mesNum=parseInt(mes)-1;
    
    // Pega descrição e valor — tenta várias posições
    let desc="",valorStr="";
    if(cols.length>=3){
      // Formato: Data; Historico/Desc; Valor  ou  Data; Hist; Desc; Valor
      if(cols.length>=4&&cols[3]){
        desc=(cols[1]+" "+cols[2]).trim();
        valorStr=cols[3];
      } else {
        desc=cols[1];
        valorStr=cols[2];
      }
    }
    if(!desc||!valorStr)continue;
    
    // Limpa valor: remove R$, espaços, troca vírgula por ponto
    valorStr=valorStr.replace(/R\$|\s/g,"").replace(/\.(?=\d{3})/g,"").replace(",",".");
    const valor=parseFloat(valorStr);
    if(isNaN(valor)||valor===0)continue;
    
    // Tipo
    const tipo=valor<0?"gasto":"receita";
    const valorAbs=Math.abs(valor);
    
    // Tenta categorizar automaticamente
    const descLow=desc.toLowerCase();
    let cat="outros";
    if(/pix|ted|doc|transf|receb/.test(descLow))cat="outros";
    if(/ifood|restaur|lanche|padaria|mercado|super|aliment|refeic|burger|pizza/.test(descLow))cat="alimentacao";
    if(/uber|99|taxi|onibus|metro|combustiv|posto|gasolina|transport/.test(descLow))cat="transporte";
    if(/netflix|spotify|cinema|teatro|show|lazer|jogo|game/.test(descLow))cat="lazer";
    if(/fatura|cartao|credito/.test(descLow))cat="fatura";
    
    itens.push({id:Date.now()+i,tipo,descricao:desc.substring(0,60),valor:valorAbs,
      categoria:tipo==="gasto"?cat:null,parcelas:1,data,
      mesNum,ano:parseInt(ano)});
  }
  return itens;
}

function mostrarPreview(itens){
  if(!itens.length)return;
  // Agrupa por mês/ano
  const grupos={};
  itens.forEach(item=>{
    const k=item.ano+"-"+String(item.mesNum+1).padStart(2,"0");
    if(!grupos[k])grupos[k]={mes:item.mesNum,ano:item.ano,itens:[]};
    grupos[k].itens.push(item);
  });
  const total=itens.length;
  const totalGas=itens.filter(i=>i.tipo==="gasto").reduce((s,i)=>s+i.valor,0);
  const totalRec=itens.filter(i=>i.tipo==="receita").reduce((s,i)=>s+i.valor,0);

  let html=`<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:14px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:900;color:#166534;margin-bottom:6px">✅ ${total} transações encontradas!</div>
    <div style="font-size:11px;color:#166534">💸 Gastos: ${fmt(totalGas)} &nbsp;|&nbsp; 💰 Receitas: ${fmt(totalRec)}</div>
  </div>`;

  // Preview primeiros 5
  html+=`<div style="font-size:12px;font-weight:800;color:#be185d;margin-bottom:8px">Prévia (primeiros registros):</div>`;
  itens.slice(0,5).forEach(item=>{
    const cat=item.categoria?CATS[item.categoria]:null;
    html+=`<div style="background:#fff;border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border-left:3px solid ${item.tipo==="gasto"?(cat?.cor||"#ec4899"):"#86efac"}">
      <div><div style="font-size:12px;font-weight:700;color:#831843">${item.descricao.substring(0,30)}</div>
      <div style="font-size:10px;color:#f9a8d4">${item.data} · ${cat?.label||"Receita"}</div></div>
      <div style="font-size:13px;font-weight:900;color:${item.tipo==="gasto"?"#f43f5e":"#16a34a"};font-family:monospace">${item.tipo==="gasto"?"−":"+"}${fmt(item.valor)}</div>
    </div>`;
  });
  if(itens.length>5)html+=`<div style="text-align:center;font-size:11px;color:#f9a8d4;margin-bottom:12px">...e mais ${itens.length-5} transações</div>`;

  // Botão importar
  html+=`<button class="btn-pink-lg" onclick="confirmarImport()" style="margin-top:8px">Importar tudo 💖</button>`;
  html+=`<div id="itens-cache" style="display:none">${JSON.stringify(itens)}</div>`;
  document.getElementById("import-preview").innerHTML=html;
}

function confirmarImport(){
  const cacheEl=document.getElementById("itens-cache");
  if(!cacheEl)return;
  const itens=JSON.parse(cacheEl.textContent);
  let count=0;
  itens.forEach(item=>{
    const chave=gk(item.mesNum,item.ano);
    if(!state.lanc[chave])state.lanc[chave]=[];
    // Evita duplicatas por id
    if(!state.lanc[chave].find(i=>i.id===item.id)){
      const {mesNum,ano,...clean}=item;
      state.lanc[chave].push(clean);
      count++;
    }
  });
  persist();
  showNotif(count+" transações importadas! 💖");
  renderHeader();
  document.getElementById("import-preview").innerHTML=`<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:16px;text-align:center">
    <div style="font-size:24px;margin-bottom:8px">🎉</div>
    <div style="font-size:14px;font-weight:900;color:#166534">${count} transações importadas!</div>
    <div style="font-size:12px;color:#166534;margin-top:4px">Veja no Histórico 💕</div>
  </div>`;
}

// ── INIT ──────────────────────────────────────────────
initSelects();
render();
</script>
</body>
</html>
